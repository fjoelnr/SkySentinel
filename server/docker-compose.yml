version: '3'
services:
  influxdb:
    image: influxdb:2
    volumes:
      - influxdb-data:/var/lib/influxdb2
    ports:
      - "8086:8086"
  grafana:
    image: grafana/grafana
    ports:
      - "3000:3000"
    volumes:
      - grafana-data:/var/lib/grafana
volumes:
  influxdb-data:
  grafana-data:
